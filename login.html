<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Learn Italian with Iqra</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#1a5276">
</head>
<body>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="auth-brand">Learn Italian <span>with Iqra</span></a>
          <h1 id="authTitle">Student Login</h1>
          <p id="authSubtitle">Access your courses and video lessons</p>
        </div>

        <form id="authForm" class="auth-form">
          <div class="form-group" id="nameGroup" style="display:none;">
            <label for="authName">Full Name</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" id="authName" placeholder="Enter your full name">
            </div>
          </div>
          <div class="form-group">
            <label for="authEmail">Email</label>
            <div class="input-icon">
              <i class="fas fa-envelope"></i>
              <input type="email" id="authEmail" placeholder="Enter your email" required>
            </div>
          </div>
          <div class="form-group">
            <label for="authPassword">Password</label>
            <div class="input-icon">
              <i class="fas fa-lock"></i>
              <input type="password" id="authPassword" placeholder="Enter your password" required minlength="6">
            </div>
          </div>
          <div class="form-group" id="phoneGroup" style="display:none;">
            <label for="authPhone">Phone Number</label>
            <div class="input-icon">
              <i class="fas fa-phone"></i>
              <input type="tel" id="authPhone" placeholder="Enter your phone number">
            </div>
          </div>
          <div id="authError" class="auth-error" style="display:none;"></div>
          <button type="submit" class="btn btn-primary auth-submit" id="authSubmitBtn">
            <i class="fas fa-sign-in-alt"></i> <span id="authBtnText">Login</span>
          </button>
        </form>

        <div class="auth-footer">
          <p id="authToggleText">Don't have an account?</p>
          <button class="auth-toggle-btn" id="authToggleBtn">Register</button>
        </div>

        <div class="auth-divider"><span>or</span></div>
        <a href="index.html" class="btn btn-outline auth-guest" style="color:var(--text);border-color:var(--border);">
          <i class="fas fa-arrow-left"></i> Back to Home
        </a>
      </div>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let isRegister = false;
    const authForm = document.getElementById('authForm');
    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const authBtnText = document.getElementById('authBtnText');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const authToggleBtn = document.getElementById('authToggleBtn');
    const authToggleText = document.getElementById('authToggleText');
    const authError = document.getElementById('authError');
    const nameGroup = document.getElementById('nameGroup');
    const phoneGroup = document.getElementById('phoneGroup');

    authToggleBtn.addEventListener('click', () => {
      isRegister = !isRegister;
      authTitle.textContent = isRegister ? 'Student Register' : 'Student Login';
      authSubtitle.textContent = isRegister ? 'Create your account to get started' : 'Access your courses and video lessons';
      authBtnText.textContent = isRegister ? 'Register' : 'Login';
      authSubmitBtn.innerHTML = `<i class="fas fa-${isRegister ? 'user-plus' : 'sign-in-alt'}"></i> <span id="authBtnText">${isRegister ? 'Register' : 'Login'}</span>`;
      authToggleText.textContent = isRegister ? 'Already have an account?' : "Don't have an account?";
      authToggleBtn.textContent = isRegister ? 'Login' : 'Register';
      nameGroup.style.display = isRegister ? 'block' : 'none';
      phoneGroup.style.display = isRegister ? 'block' : 'none';
      authError.style.display = 'none';
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      authError.style.display = 'none';
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;

      try {
        await initFirebase();

        if (isRegister) {
          const name = document.getElementById('authName').value.trim();
          const phone = document.getElementById('authPhone').value.trim();
          if (!name) { showError('Please enter your name'); return; }

          const cred = await signUpWithEmail(email, password);
          await createStudentProfile(cred.user.uid, {
            name: name,
            email: email,
            phone: phone,
            role: 'student',
            level: '',
            isActive: false,
            createdAt: new Date().toISOString()
          });
          window.location.href = 'videos.html';
        } else {
          await signInWithEmail(email, password);
          window.location.href = 'videos.html';
        }
      } catch (err) {
        let msg = 'Something went wrong. Please try again.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
        else if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
        else if (err.code === 'auth/email-already-in-use') msg = 'This email is already registered.';
        else if (err.code === 'auth/weak-password') msg = 'Password must be at least 6 characters.';
        else if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
        showError(msg);
      }
    });

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = 'block';
    }

    initFirebase().then(() => {
      onAuthStateChanged(user => {
        if (user) window.location.href = 'videos.html';
      });
    });
  </script>
</body>
</html>
